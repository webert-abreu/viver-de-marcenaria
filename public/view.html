<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Verificador de Fotos do Edriano</title>
  <style>
    body {
      background-color: #121212;
      color: #fff;
      font-family: sans-serif;
      padding: 20px;
    }
    h1 {
      text-align: center;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .card {
      background-color: #1e1e1e;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    img {
      max-width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 4px;
      background-color: #333;
    }
    .title {
      margin-top: 8px;
      font-size: 14px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>Catálogo de Imagens</h1>
  <div class="grid" id="grid"></div>

  <script>
    const totalImages = 28;
    const grid = document.getElementById('grid');

    // Add main image
    const mainCard = document.createElement('div');
    mainCard.className = 'card';
    mainCard.innerHTML = `
      <img src="/WhatsApp Image 2026-06-25 at 19.12.41.jpeg" alt="Principal">
      <div class="title">Principal (sem número)</div>
    `;
    grid.appendChild(mainCard);

    // Add numbered images
    for (let i = 1; i <= totalImages; i++) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="/WhatsApp%20Image%202026-06-25%20at%2019.12.41%20(${i}).jpeg" alt="(${i})">
        <div class="title">Foto (${i})</div>
      `;
      grid.appendChild(card);
    }
  </script>
</body>
</html>
